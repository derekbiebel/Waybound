<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Waybound">
<meta name="theme-color" content="#f5ede0">
<title>Waybound</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#fdf6eb;--card:#fffdf7;--brown:#5a3e22;--tan2:#e8d4b4;
  --green:#5a8f4a;--green2:#7ab86a;--green3:#d4edcc;--green4:#edf7e8;
  --rose:#d4707a;--rose2:#f0b8bc;--rose3:#fde8ea;
  --amber:#e8a830;--amber2:#f5d080;--amber3:#fef3d0;
  --purple:#8b6fbf;--purple2:#c8b8e8;--purple3:#f0eaf8;
  --sky:#5b9fd4;--sky3:#dff0fa;
  --text:#4a3520;--text2:#8a6a48;--text3:#2a1f0f;
  --border:#d4b88a;--border2:#e8d4b4;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);font-family:'Nunito',sans-serif;color:var(--text);min-height:100vh;overflow-x:hidden}
#app{max-width:480px;margin:0 auto;padding:0 16px 90px}
.fredoka{font-family:'Fredoka',sans-serif}
.btn{display:block;width:100%;border:none;padding:16px;font-family:'Fredoka',sans-serif;font-weight:600;font-size:1rem;cursor:pointer;border-radius:8px;transition:transform .1s,box-shadow .1s}
.btn:active{transform:translateY(2px)}
.btn-green{background:var(--green);color:#fff;border:3px solid #3a6030;box-shadow:0 4px 0 #3a6030}
.btn-green:active{box-shadow:0 2px 0 #3a6030}
.btn-green:disabled{background:var(--tan2);color:var(--text2);border-color:var(--border);box-shadow:none;cursor:not-allowed;transform:none}
.btn-amber{background:var(--amber);color:var(--brown);border:3px solid #a06010;box-shadow:0 4px 0 #a06010}
.btn-amber:active{box-shadow:0 2px 0 #a06010}
.btn-amber:disabled{background:var(--tan2);color:var(--text2);border-color:var(--border);box-shadow:none;cursor:not-allowed;transform:none}
.btn-ghost{display:inline-block;width:auto;background:var(--card);border:2px solid var(--border);border-radius:6px;padding:8px 14px;color:var(--text2);font-family:'Fredoka',sans-serif;font-size:.9rem;cursor:pointer;box-shadow:0 3px 0 var(--border2)}
.btn-ghost:active{transform:translateY(1px);box-shadow:0 1px 0 var(--border2)}
.card{background:var(--card);border:3px solid var(--border);border-radius:10px;padding:16px;margin-bottom:14px;box-shadow:0 4px 0 var(--border2)}
/* Start */
.start-wrap{text-align:center;padding:44px 8px 32px}
.start-emblem{font-size:5rem;display:block;margin-bottom:6px;animation:bounce 2.5s ease-in-out infinite;filter:drop-shadow(3px 4px 0 rgba(90,60,20,.2))}
@keyframes bounce{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-10px) rotate(2deg)}}
.start-title{font-size:2.8rem;color:var(--green);text-shadow:3px 3px 0 #3a6030;margin-bottom:4px;line-height:1}
.start-tag{font-size:.72rem;text-transform:uppercase;letter-spacing:.22em;color:#c9a87a;display:block;margin-bottom:22px}
.start-lore{font-size:.97rem;line-height:1.85;font-style:italic;margin-bottom:16px;background:var(--amber3);border:2px solid var(--amber2);border-radius:8px;padding:16px;box-shadow:0 3px 0 var(--amber2)}
.hint-row{display:flex;align-items:center;gap:10px;font-size:.87rem;color:var(--text2);margin-bottom:8px;background:var(--green4);border:2px solid var(--green3);border-radius:6px;padding:10px 12px;box-shadow:0 2px 0 var(--green3)}
.hint-icon{font-size:1.2rem;flex-shrink:0}
.start-hints{margin-bottom:26px}
/* Game */
.game-header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;padding:6px 4px;border-bottom:1px solid rgba(80,45,10,0.25)}
.game-title{font-size:1.15rem;color:var(--green)}
.game-meta{display:flex;align-items:center;gap:8px}
.day-badge{font-size:.65rem;color:rgba(55,25,5,0.85);background:rgba(225,200,140,0.80);border:1px solid rgba(80,45,10,0.45);border-radius:2px;padding:3px 10px;font-family:Georgia,serif;font-style:italic;letter-spacing:.05em}
.reset-btn{background:none;border:2px solid var(--border);border-radius:20px;padding:4px 10px;font-family:'Fredoka',sans-serif;font-size:.7rem;color:var(--text2);cursor:pointer}
.reset-btn:active{background:var(--rose3);border-color:var(--rose);color:var(--rose)}
/* Resources */
.resources{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:14px}
.res-card{background:rgba(232,215,158,0.72);border:1.5px solid rgba(80,45,10,0.45);border-radius:3px;padding:8px 6px;text-align:center;box-shadow:inset 0 0 12px rgba(140,90,20,0.08),1px 2px 4px rgba(30,12,0,0.18);transition:border-color .3s;position:relative}
.res-card::before{content:'';position:absolute;inset:2px;border:0.5px solid rgba(80,45,10,0.18);border-radius:2px;pointer-events:none}
.res-card.danger{border-color:rgba(160,30,20,0.65);animation:wobble .7s ease-in-out infinite alternate}
@keyframes wobble{from{transform:rotate(-.5deg)}to{transform:rotate(.5deg)}}
.res-icon{display:block;margin:0 auto 4px;opacity:0.88}
.res-label{font-size:.58rem;text-transform:uppercase;letter-spacing:.15em;color:rgba(60,32,8,0.72);margin-bottom:5px;display:block;font-family:'Georgia',serif;font-style:italic}
.res-track{height:6px;background:rgba(160,120,60,0.22);border-radius:0;overflow:hidden;margin-bottom:4px;border:0.8px solid rgba(80,45,10,0.28)}
.res-fill{height:100%;border-radius:0;transition:width .7s ease}
.res-val{font-family:'Georgia',serif;font-size:.95rem;font-weight:bold;color:rgba(45,20,5,0.88)}
.res-warn{font-size:.58rem;color:var(--rose);display:block;margin-top:2px;font-family:'Fredoka',sans-serif;animation:flash 1s infinite}
.res-card .res-icon svg{display:block;margin:0 auto}
@keyframes flash{0%,100%{opacity:1}50%{opacity:.4}}
/* Scene image */
.scene-wrap{margin-bottom:14px;border:3px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:0 4px 0 var(--border2);background:var(--green4);min-height:80px;display:flex;align-items:center;justify-content:center}
.scene-img{display:block;width:100%;height:auto;max-height:280px;object-fit:cover}
.scene-loading{color:var(--text2);font-style:italic;font-size:.88rem;display:flex;align-items:center;gap:10px;padding:20px;font-family:'Fredoka',sans-serif}
/* Story */
.story-card{position:relative;overflow:hidden;padding-top:22px !important}
.story-card::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:repeating-linear-gradient(90deg,var(--green) 0,var(--green) 6px,var(--amber) 6px,var(--amber) 12px,#5b9fd4 12px,#5b9fd4 18px,var(--rose) 18px,var(--rose) 24px);opacity:.5}
.chapter-label{font-size:.66rem;text-transform:uppercase;letter-spacing:.16em;color:var(--purple);display:block;margin-bottom:10px;font-family:'Fredoka',sans-serif}
.story-body{font-size:.97rem;line-height:1.88;color:var(--text3)}
.loading-row{display:flex;align-items:center;gap:10px;color:var(--text2);font-style:italic;font-size:.9rem}
.spin{display:inline-block;animation:spin 1.2s linear infinite;font-size:1.2rem}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.fab{position:fixed;bottom:28px;right:20px;background:rgba(45,22,5,0.93);color:rgba(235,215,160,0.97);border:1px solid rgba(235,215,160,0.30);border-radius:2px;padding:12px 24px;font-family:'Georgia',serif;font-style:italic;font-size:.88rem;letter-spacing:.06em;cursor:pointer;box-shadow:4px 4px 0 rgba(10,3,0,0.58);transition:transform .1s,box-shadow .1s;z-index:100}.fab:active{transform:translate(3px,3px);box-shadow:1px 1px 0 rgba(10,3,0,0.58)}.fab:active{transform:translate(2px,2px);box-shadow:1px 1px 0 rgba(15,5,0,0.50)}
.fab:active{transform:translateY(2px);box-shadow:0 2px 0 #a06010}
.history-toggle{font-size:.82rem;color:var(--text2);cursor:pointer;padding:8px 0;display:block;font-family:'Fredoka',sans-serif}
.history-passage{opacity:.55;margin-top:10px}
/* Chore flow */
.chore-flow-wrap{padding-top:16px}
.back-row{margin-bottom:18px}
.step-dots{display:flex;justify-content:center;gap:10px;margin-bottom:22px}
.dot{width:12px;height:12px;border-radius:2px;background:var(--border2);border:2px solid var(--border);transition:all .3s}
.dot.active{background:var(--amber);border-color:#a06010;transform:rotate(45deg)}
.dot.done{background:var(--green);border-color:#3a6030}
.flow-head{font-size:1.2rem;color:var(--brown);text-align:center;margin-bottom:5px;display:block}
.flow-sub{text-align:center;font-size:.87rem;color:var(--text2);font-style:italic;margin-bottom:20px;display:block}
.section-label{font-size:.62rem;text-transform:uppercase;letter-spacing:.16em;color:var(--purple);display:block;margin-bottom:12px;font-family:'Fredoka',sans-serif}
.res-mini-bar{display:flex;justify-content:center;gap:18px;background:var(--card);border:2px solid var(--border);border-radius:8px;padding:8px 16px;margin-bottom:14px;box-shadow:0 2px 0 var(--border2)}
.res-mini-item{display:flex;align-items:center;gap:6px;font-family:'Fredoka',sans-serif;font-size:.88rem;font-weight:600}
.chore-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.chore-btn{background:var(--card);border:3px solid var(--border);border-radius:8px;padding:14px 8px;color:var(--text);font-family:'Nunito',sans-serif;font-size:.9rem;cursor:pointer;text-align:center;line-height:1.4;box-shadow:0 3px 0 var(--border2);transition:all .15s}
.chore-btn:active{transform:translateY(1px);box-shadow:0 1px 0 var(--border2)}
.chore-btn.selected{background:var(--green4);border-color:var(--green);box-shadow:0 3px 0 var(--green3);color:var(--brown)}
.chore-icon-big{font-size:1.8rem;display:block;margin-bottom:5px}
.chore-diff{font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;margin-top:5px;display:block;font-family:'Fredoka',sans-serif}
.diff-hard{color:var(--rose)}.diff-medium{color:var(--purple)}.diff-easy{color:var(--green)}
/* Path node cards */
.path-cards{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.path-card{background:var(--card);border:3px solid var(--border);border-radius:10px;padding:14px 16px;cursor:pointer;box-shadow:0 3px 0 var(--border2);transition:all .15s;display:flex;align-items:flex-start;gap:12px}
.path-card:active{transform:translateY(1px);box-shadow:0 1px 0 var(--border2)}
.path-card.selected{box-shadow:0 3px 0 var(--border)}
.path-node-icon{font-size:2rem;flex-shrink:0;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:3px solid currentColor;font-size:1.4rem}
.path-card-body{flex:1}
.path-node-type{font-family:'Fredoka',sans-serif;font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.path-node-desc{font-size:.9rem;line-height:1.55;color:var(--text3)}
.paths-loading{text-align:center;padding:36px 0;color:var(--text2);font-style:italic}
/* Map canvas */
.map-canvas-wrap{background:var(--card);border:3px solid var(--border);border-radius:10px;margin-bottom:14px;box-shadow:0 4px 0 var(--border2);overflow:hidden}
.map-canvas-wrap canvas{display:block;width:100%}
/* Map legend */
.map-legend{display:flex;flex-wrap:wrap;gap:6px 14px;margin-bottom:10px;justify-content:center;padding:6px 0;border-top:1px solid rgba(90,52,18,0.18);border-bottom:1px solid rgba(90,52,18,0.18)}
.legend-item{display:flex;align-items:center;gap:5px;font-size:.68rem;font-family:'Georgia',serif;font-style:italic;color:rgba(55,28,8,0.72)}
/* End */
.end-wrap{text-align:center;padding:48px 12px 32px}
.end-emblem{font-size:5rem;display:block;margin-bottom:18px;animation:bounce 2s ease-in-out infinite}
.end-title{font-size:1.6rem;margin-bottom:16px;line-height:1.3}
.end-title.victory{color:var(--green);text-shadow:2px 2px 0 #3a6030}
.end-title.defeat{color:var(--rose)}
.end-story{font-size:.97rem;line-height:1.88;font-style:italic;margin-bottom:20px;background:var(--amber3);border:2px solid var(--amber2);border-radius:8px;padding:16px;box-shadow:0 3px 0 var(--amber2)}
.end-stats{background:var(--green4);border:2px solid var(--green3);border-radius:8px;padding:14px 16px;font-size:.88rem;color:var(--text2);margin-bottom:24px;line-height:1.8;box-shadow:0 3px 0 var(--green3)}
#toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--green);color:#fff;border:3px solid #3a6030;border-radius:8px;padding:10px 22px;font-size:.9rem;font-family:'Fredoka',sans-serif;font-weight:600;z-index:200;transition:transform .3s ease;white-space:nowrap;pointer-events:none;box-shadow:0 4px 0 #3a6030}
#toast.show{transform:translateX(-50%) translateY(0)}
/* ── ARRIVAL EFFECTS ──────────────────────────────────────────────────────── */
#arrival-flash{position:fixed;inset:0;z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity 0.3s ease}
#arrival-flash.show{opacity:1;pointer-events:all}
#arrival-flash.hide{opacity:0}
.arrival-icon{font-size:5rem;margin-bottom:16px;filter:drop-shadow(0 4px 16px rgba(0,0,0,0.3));animation:arrivalPop 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards}
.arrival-label{font-family:'Fredoka',sans-serif;font-size:1.6rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;text-shadow:0 2px 8px rgba(0,0,0,0.3)}
@keyframes arrivalPop{from{transform:scale(0.5) translateY(20px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
/* Mood tinting */
body{transition:background-color 1.2s ease}
body.mood-encounter{background:#fdf0f0}
body.mood-rest{background:#f0f5fd}
body.mood-unknown{background:#f3f0fd}
body.mood-elite{background:#fdf0f0}
body.mood-event{background:#fdf8ec}
body.mood-start{background:var(--bg)}
body.mood-temple{background:#fdf8ec}
/* Typewriter story */
.story-body.typing .story-char{opacity:0;animation:charFade 0.03s forwards}
@keyframes charFade{to{opacity:1}}
.setup-wrap{text-align:center;padding:48px 16px 32px;max-width:400px;margin:0 auto}
.setup-icon{font-size:3.5rem;display:block;margin-bottom:16px;animation:bounce 2.5s ease-in-out infinite}
.setup-title{font-size:1.8rem;color:var(--green);text-shadow:2px 2px 0 #3a6030;margin-bottom:6px}
.setup-sub{font-size:.85rem;color:var(--text2);margin-bottom:24px;display:block;line-height:1.6}
.setup-card{background:var(--card);border:3px solid var(--border);border-radius:10px;padding:20px;margin-bottom:20px;box-shadow:0 4px 0 var(--border2);text-align:left}
.setup-label{font-size:.75rem;text-transform:uppercase;letter-spacing:.12em;color:var(--text2);font-family:'Fredoka',sans-serif;display:block;margin-bottom:8px}
.setup-input{width:100%;border:2px solid var(--border);border-radius:6px;padding:12px;font-family:'Nunito',sans-serif;font-size:.9rem;color:var(--text);background:var(--bg);outline:none;box-sizing:border-box}
.setup-input:focus{border-color:var(--green)}
.setup-hint{font-size:.78rem;color:var(--text2);margin-top:8px;display:block;line-height:1.5}
.setup-hint a{color:var(--green)}
</style>
</head>

const NODE_DELTAS = {"encounter": {"goldDelta": 15, "healthDelta": -18, "foodDelta": -8}, "rest": {"goldDelta": 0, "healthDelta": 20, "foodDelta": -20}, "unknown": {"goldDelta": 8, "healthDelta": -8, "foodDelta": -10}, "elite": {"goldDelta": 28, "healthDelta": -28, "foodDelta": -6}, "event": {"goldDelta": 5, "healthDelta": 5, "foodDelta": -8}, "start": {"goldDelta": 0, "healthDelta": 0, "foodDelta": 0}, "temple": {"goldDelta": 0, "healthDelta": 0, "foodDelta": 0}};
const NODE_PROMPTS = {"encounter": "This is an ENCOUNTER node — dangerous, high stakes. The protagonist faces a direct physical challenge: a territorial animal, treacherous terrain, Vey's guards, a sudden storm. High health cost likely. Gold reward possible if they overcome it.", "rest": "This is a REST node — a moment to recover. The protagonist finds shelter, tends wounds, eats a proper meal. Health recovers but food is consumed. Slower, safer, personal.", "unknown": "This is an UNKNOWN node — anything could happen. The protagonist investigates something unexpected: strange sounds, odd markings, an abandoned campsite. Outcome genuinely unpredictable.", "elite": "This is an ELITE node — very dangerous, very rewarding. The protagonist faces something truly threatening: a large predator, Vey himself, a near-fatal trap. Serious health cost but significant gold or information reward.", "event": "This is an EVENT node — a story moment tied to Mara or Vey. The protagonist discovers a clue, a memory, a choice. This must advance the central mystery meaningfully.", "temple": "This is the TEMPLE — the journey ends here."};
const CHAPTERS = ["The Journal Page", "The First Steps", "Deeper In", "The River", "Old Paths", "What She Left", "Signs of Vey", "The Canopy", "Almost There", "Ancient Stone", "The Temple Gate"];

const LORE = `STORY CONTEXT — weave into every passage:
PROTAGONIST: You — capable, grieving. Came to pack up your sister Mara's cottage. Found her torn journal page under the floorboards instead.
MARA: Your younger sister. Botanist. Vanished six months ago chasing the Temple of Aurathen. Her last entry: "Vey knows. Move faster."

THE REAL STAKES: What happened to Mara. Beating Vey. What you do with what she found.
TONE: Personal. Oregon Trail stakes inside a Stardew Valley world. Beautiful setting, real consequences.`;

    screen: localStorage.getItem('waybound_api_key') ? 'start' : 'setup', resources:{gold:60,health:70,food:65},
    nodePos:0, visitedNodes:[0], passages:[],

    choreStep:0, selectedChore:null, selectedPath:null,
    pathOptions:[], pathsLoading:false, storyLoading:false,

}

var S = (function() {

  catch(e) { return fresh(); }

function save() { try { localStorage.setItem(SAVE_KEY, JSON.stringify(S)); } catch(e) {} }

async function ai(prompt) {
  var r = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key':API_KEY,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body: JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:900,
      messages:[{role:'user',content:prompt}]
    })
  });
  if (!r.ok) throw new Error(r.status);
  return (await r.json()).content[0].text;
}

function currentNode() { return NODES[S.nodePos]; }

function getNextNodes() {
  var cur = S.nodePos;
  return CONNECTIONS

}

function logEvent(type, nodeType, deltas, chore) {
  var entry = { step: S.choresCompleted, type: type, node: nodeType };
  if (deltas.healthDelta < -20) entry.note = 'badly injured';
  else if (deltas.healthDelta < 0) entry.note = 'took damage';
  else if (deltas.healthDelta > 0) entry.note = 'recovered health';
  if (deltas.foodDelta < -15) entry.note = (entry.note ? entry.note + ', ' : '') + 'food running low';
  if (deltas.goldDelta > 20) entry.note = (entry.note ? entry.note + ', ' : '') + 'found significant gold';
  if (chore) entry.chore = chore.name;
  S.eventLog.push(entry);
  // Keep log compact — last 8 events only
  if (S.eventLog.length > 8) S.eventLog = S.eventLog.slice(-8);
  // Track resource trend
  S.resourceTrend.gold   += (deltas.goldDelta   || 0);
  S.resourceTrend.health += (deltas.healthDelta || 0);
  S.resourceTrend.food   += (deltas.foodDelta   || 0);
}

function journalSummary() {
  var r = S.resources;
  var low = [];
  if (r.health <= 25) low.push('critically injured');
  else if (r.health <= 45) low.push('wounded');
  if (r.food <= 25) low.push('near starvation');
  else if (r.food <= 45) low.push('hungry');
  if (r.gold <= 20) low.push('nearly broke');

  var trend = [];
  if (S.resourceTrend.health < -40) trend.push('health has been steadily declining');
  if (S.resourceTrend.food < -40) trend.push('food supplies are depleting fast');
  if (S.resourceTrend.gold > 40) trend.push('gold reserves have been building');

  var nodeTypeCounts = {};
  S.visitedNodes.forEach(function(id) {
    var n = NODES[id];
    if (n) nodeTypeCounts[n.type] = (nodeTypeCounts[n.type] || 0) + 1;
  });
  var routeStyle = [];
  if ((nodeTypeCounts.encounter || 0) >= 2) routeStyle.push('taken an aggressive, dangerous route');
  if ((nodeTypeCounts.rest || 0) >= 2) routeStyle.push('played it cautiously, resting often');
  if ((nodeTypeCounts.elite || 0) >= 1) routeStyle.push('survived at least one elite threat');
  if ((nodeTypeCounts.event || 0) >= 2) routeStyle.push('uncovered multiple clues about Mara');

  var recentEvents = S.eventLog.slice(-4).map(function(e) {
    return e.node + (e.note ? ' (' + e.note + ')' : '');
  }).join(' → ');

  var progress = Math.round((S.visitedNodes.length / 15) * 100);

  return [
    'JOURNEY SO FAR (' + S.choresCompleted + ' chores, ~' + progress + '% through):',
    low.length ? 'Current state: ' + low.join(', ') + '.' : 'Current state: holding together.',
    trend.length ? 'Trend: ' + trend.join('; ') + '.' : '',
    routeStyle.length ? 'Route character: has ' + routeStyle.join(', ') + '.' : '',
    recentEvents ? 'Recent path: ' + recentEvents + '.' : '',
    'Resources: Gold ' + r.gold + ', Health ' + r.health + ', Food ' + r.food + ' /100.',
  ].filter(Boolean).join('\n');
}

async function genOpening() {
  return ai(LORE + `

Write the story opening. 5-6 sentences, second person.
The protagonist has just found Mara's torn journal page wedged under the floorboards of her cottage. They have been here weeks sorting her things. The page is dated four months ago — she made it past the river crossing. Her last line: "Vey knows. Move faster."
End as they shoulder a pack, step off the porch into morning light, and push through the garden gate into the jungle. Driven. Frightened. Aware Vey already has a head start.
Specific and personal. No lists. No markdown.`);
}

async function genPathDescriptions(nextNodes) {
  var cur = currentNode();
  var last = S.passages.length ? S.passages[S.passages.length-1].text : '';
  var nodeDescs = nextNodes.map(function(n) {
    return NODE_TYPES[n.type].icon + ' ' + NODE_TYPES[n.type].label + ' (' + n.type + ')';
  }).join(', ');

  var prompt = LORE + `

${journalSummary()}

Last passage: "${last.slice(0,250)}"

The protagonist must now choose between these routes: ${nodeDescs}

Write a vivid 20-30 word description for each path. The descriptions MUST:
- Reflect the protagonist's current physical/emotional state (injured? hungry? running out of time?)
- Feel like they follow naturally from the last passage
- Implicitly signal the risk/reward:
  - Encounter: danger, something blocking the way, conflict
  - Rest: shelter, quiet, recovery — but time lost
  - Unknown: something strange, doesn't add up, could go either way
  - Elite: serious threat, but something valuable is clearly nearby
  - Event: a trace of Mara or Vey, a story clue, a personal moment
- Never repeat descriptions from earlier in this run

Reply ONLY with raw JSON array, no markdown:
[{"nodeId":${nextNodes[0].id},"desc":"..."},{"nodeId":${nextNodes[1] ? nextNodes[1].id : nextNodes[0].id},"desc":"..."}${nextNodes[2] ? ',{"nodeId":' + nextNodes[2].id + ',"desc":"..."}' : ''}]`;

  var raw = await ai(prompt);
  return JSON.parse(raw.replace(/```json|```/g, '').trim());
}

async function genPassage(chosenNode) {
  var low = Object.entries(S.resources).filter(function(e) { return e[1] <= 30; }).map(function(e) { return e[0]; });
  var critical = Object.entries(S.resources).filter(function(e) { return e[1] <= 15; }).map(function(e) { return e[0]; });
  var nearEnd = chosenNode.row >= 7;
  var veryNearEnd = chosenNode.row >= 9;
  var last = S.passages.length ? S.passages[S.passages.length-1].text : '';
  var deltas = NODE_DELTAS[chosenNode.type] || {};
  var ch = [];
  if (deltas.goldDelta > 0) ch.push('gained ' + deltas.goldDelta + ' gold worth of supplies/valuables');
  if (deltas.goldDelta < 0) ch.push('lost ' + Math.abs(deltas.goldDelta) + ' gold worth of gear/bribes/damage');
  if (deltas.healthDelta > 0) ch.push('recovered ' + deltas.healthDelta + ' health points');
  if (deltas.healthDelta < 0) ch.push('took ' + Math.abs(deltas.healthDelta) + ' points of physical damage');
  if (deltas.foodDelta > 0) ch.push('found food worth ' + deltas.foodDelta + ' provisions');
  if (deltas.foodDelta < 0) ch.push('consumed ' + Math.abs(deltas.foodDelta) + ' provisions');
  var chStr = ch.length ? ch.join('; ') : 'no resource change this leg';
  var nodeContext = NODE_PROMPTS[chosenNode.type] || '';

  var toneGuide = '';
  if (critical.length) {
    toneGuide = 'TONE: The protagonist is at their limit. ' + critical.join(' and ') + ' critically low. Writing should feel desperate, visceral, survival-mode. No hope without a miracle.';
  } else if (low.length) {
    toneGuide = 'TONE: The protagonist is struggling. ' + low.join(' and ') + ' dangerously low. Writing should feel strained, cautious, the jungle winning.';
  } else if (S.resources.health > 75 && S.resources.food > 75) {
    toneGuide = 'TONE: The protagonist is in good shape physically. Writing can have focus and momentum — driven, purposeful, alert.';
  }

  var prompt = LORE + `

${journalSummary()}

${toneGuide}
${nodeContext}

Previous passage: "${last.slice(0,300)}"
What happened this leg: ${chStr}
${nearEnd ? 'PROXIMITY: The temple is close now. Ancient carved stone glimpsed through the canopy. Urgency is building.' : ''}
${veryNearEnd ? 'PROXIMITY: This is almost certainly the final push. Vey may already be at the temple. Everything converges here.' : ''}

Write 5-7 punchy second-person sentences. Requirements:
1. The resource changes MUST come from specific story events — never name the numbers directly, but every change must be explained by something that physically happens (injury, eating, finding cache, etc.)
2. The passage MUST fit the node type (${chosenNode.type}): ${nodeContext.split('.')[0]}.
3. The protagonist's current state (injuries, hunger, morale) must color the writing — a wounded person moves differently, sees differently.
4. Advance the Mara/Vey storyline with at least one concrete detail: a clue, a trace, a decision, a memory triggered by the environment.
5. The writing must feel continuous with the previous passage — same journey, same body, same emotional thread.
6. End with one sharp sensory detail of where you are now.
No vague mood prose. No markdown. Every sentence must do work.`;
  return ai(prompt);
}

${journalSummary()}

Write the ending. 7-9 sentences, second person. The ending MUST reflect the specific journey this protagonist took — their injuries, their choices, what they found along the way.

- Whether Vey is already there — and what that means
- Finding Mara's final journal: what it reveals about what actually happened to her
- The map she hid, and where

function goNext() {
  S.choreStep = 1; S.pathsLoading = true; render();
  var nextNodes = getNextNodes();
  genPathDescriptions(nextNodes).then(function(descs) {
    S.pathOptions = descs.map(function(d) {
      var node = NODES.find(function(n) { return n.id === d.nodeId; });
      return { nodeId: d.nodeId, type: node ? node.type : 'unknown', desc: d.desc };
    });
    S.pathsLoading = false; save(); render();
  }).catch(function() {
    var nextNodes2 = getNextNodes();
    S.pathOptions = nextNodes2.map(function(n) {
      return { nodeId: n.id, type: n.type, desc: NODE_TYPES[n.type].label + ' — the path ahead.' };
    });
    S.pathsLoading = false; save(); render();
  });
}

async function confirmChore() {
  var chosen = S.pathOptions[S.selectedPath];
  var chosenNode = NODES.find(function(n) { return n.id === chosen.nodeId; });
  var deltas = NODE_DELTAS[chosenNode.type] || {};
  S.prevNodePos = S.nodePos;
  S.resources.gold   = Math.max(0, Math.min(MAX, S.resources.gold   + (deltas.goldDelta   || 0)));
  S.resources.health = Math.max(0, Math.min(MAX, S.resources.health + (deltas.healthDelta || 0)));
  S.resources.food   = Math.max(0, Math.min(MAX, S.resources.food   + (deltas.foodDelta   || 0)));
  S.nodePos = chosenNode.id;
  if (S.visitedNodes.indexOf(S.nodePos) < 0) S.visitedNodes.push(S.nodePos);
  logEvent('node', chosenNode.type, deltas, S.selectedChore);
  var progressGain = (S.selectedChore && S.selectedChore.diff === 'hard') ? 2 : 1;
  S.choresCompleted++;
  var dead = Object.values(S.resources).some(function(v) { return v <= 0; });
  var won = chosenNode.type === 'temple';
  S.screen = 'game'; S.storyLoading = true; S.sceneImageUrl = ''; S.sceneImageLoading = false;
  S.choreStep = 0; S.selectedChore = null; S.selectedPath = null; S.pathOptions = [];
  save(); render();
  try {
    var t = await genPassage(chosenNode);
    S.passages.push({ chapter: CHAPTERS[Math.min(S.passages.length, CHAPTERS.length-1)], text: t });
  } catch(e) {
    S.passages.push({ chapter: CHAPTERS[Math.min(S.passages.length, CHAPTERS.length-1)], text: 'You push on through the jungle.' });
  }
  S.storyLoading = false;
  if (dead || won) {
    S.sceneImageLoading = false; S.screen = 'end'; S.endLoading = true; save(); render();
    try { S.endingText = await genEnding(dead); }
    catch(e) { S.endingText = dead ? 'The jungle has you this time. But you will come back.' : 'The temple doors open. Mara\'s journal is on the altar, open to the last page.'; }
    S.endLoading = false; save(); render();
  } else {
    var lp = S.passages[S.passages.length-1];
    if (lp) genSceneImage(lp.text, chosenNode.type).then(function(url) {
      S.sceneImageUrl = url || ''; S.sceneImageLoading = false;
      save(); if (S.screen === 'game') render();
    });
    else S.sceneImageLoading = false;
    save(); render();
    // Arrival effects — deferred so render() DOM is settled first
    setTimeout(function() {
      showArrival(chosenNode.type);
      setMoodTint(chosenNode.type);
    }, 50);
    setTimeout(function() {
      var lp2 = S.passages[S.passages.length-1];
      if (lp2) typewriterStory(lp2.text);
    }, 900);
    showToast('Chore done. The path opens.');
  }
}

function showToast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 2800);
}

function showArrival(nodeType) {
  var nt = NODE_TYPES[nodeType] || NODE_TYPES.unknown;
  var el = document.getElementById('arrival-flash');
  if (!el) return;
  // Set background color matching node type
  el.style.background = nt.bg + 'ee';
  el.innerHTML = '<div class="arrival-icon">' + nt.icon + '</div>'
    + '<div class="arrival-label" style="color:' + nt.color + '">' + nt.label + '</div>';
  el.classList.add('show');
  el.classList.remove('hide');
  setTimeout(function() {
    el.classList.add('hide');
    setTimeout(function() { el.classList.remove('show','hide'); el.innerHTML = ''; }, 400);
  }, 1200);
}

function setMoodTint(nodeType) {
  document.body.className = document.body.className.replace(/mood-\w+/g, '').trim();
  document.body.classList.add('mood-' + (nodeType || 'start'));
}

function typewriterStory(text) {
  var el = document.querySelector('.story-body');
  if (!el || !text) return;
  el.innerHTML = '';
  var words = text.split(' ');
  var delay = 0;
  var chunkSize = 3; // reveal 3 words at a time
  for (var i = 0; i < words.length; i += chunkSize) {
    (function(chunk, d) {
      setTimeout(function() {
        var span = document.createElement('span');
        span.className = 'story-word-chunk';
        span.textContent = chunk + ' ';
        span.style.opacity = '0';
        span.style.transition = 'opacity 0.25s ease';
        el.appendChild(span);
        requestAnimationFrame(function() {
          requestAnimationFrame(function() { span.style.opacity = '1'; });
        });
      }, d);
    })(words.slice(i, i + chunkSize).join(' '), delay);
    delay += 80;
  }
}

function hx(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function drawSpireMap(canvasId, highlightNextNodes, travelFromId, travelToId, travelT) {
  var canvas = document.getElementById(canvasId);
  if (!canvas) return;
  var W = canvas.offsetWidth;
  if (!W || W < 10) { requestAnimationFrame(function() { drawSpireMap(canvasId, highlightNextNodes); }); return; }
  var rowH = 80, H = NUM_ROWS * rowH + 52;
  if (canvas.width !== W || canvas.height !== H) { canvas.width = W; canvas.height = H; }
  var ctx = canvas.getContext('2d');
  var now = Date.now();

  // ── BACKGROUND ────────────────────────────────────────────────────────────────
  if (_mapBgImg && _mapBgLoaded) {
    var iw = _mapBgImg.naturalWidth, ih = _mapBgImg.naturalHeight;
    var scale = Math.max(W / iw, H / ih);
    var dw = iw * scale, dh = ih * scale;
    ctx.drawImage(_mapBgImg, (W-dw)/2, (H-dh)/2, dw, dh);
  } else {
    ctx.fillStyle = '#e4d8b0'; ctx.fillRect(0, 0, W, H);
  }
  // Very light parchment wash — just enough to unify, not enough to obscure
  ctx.fillStyle = 'rgba(220,198,145,0.22)'; ctx.fillRect(0, 0, W, H);

  // ── HELPER: draw in sepia ink style ──────────────────────────────────────────
  var INK = 'rgba(22,8,2,1.0)';        // main ink color — pure dark
  var INK_LIGHT = 'rgba(22,8,2,0.72)';  // lighter ink for unvisited
  var INK_FAINT = 'rgba(22,8,2,0.45)';  // faint for distant/unvisited paths
  var GOLD = 'rgba(140,85,0,1.0)';      // golden ink for next paths
  var RED_WAX = 'rgba(162,28,18,0.92)'; // red wax seal for current position

  function nodePos(node) {
    var margin = W * 0.10, usable = W - margin * 2;
    return {x: margin + (node.col/3)*usable, y: H - 32 - node.row*rowH};
  }

  // ── PATHS — look like hand-drawn ink routes on the map ──────────────────────
  CONNECTIONS.forEach(function(c) {
    var a = nodePos(NODES[c[0]]), b = nodePos(NODES[c[1]]);
    var bothV = S.visitedNodes.indexOf(c[0]) >= 0 && S.visitedNodes.indexOf(c[1]) >= 0;
    var isNext = highlightNextNodes && highlightNextNodes.indexOf(c[1]) >= 0 && c[0] === S.nodePos;
    var mx = (a.x+b.x)/2 + (b.y-a.y)*0.08, my = (a.y+b.y)/2 + (a.x-b.x)*0.08;
    ctx.save();
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';

    if (isNext) {
      // Gold path: thick light halo + gold ink line
      ctx.setLineDash([10,6]);
      ctx.lineWidth = 10; ctx.strokeStyle = 'rgba(255,248,190,0.88)';
      ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.quadraticCurveTo(mx,my,b.x,b.y); ctx.stroke();
      ctx.lineWidth = 4; ctx.strokeStyle = GOLD;
      ctx.shadowColor = 'rgba(180,120,0,0.5)'; ctx.shadowBlur = 6;
      ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.quadraticCurveTo(mx,my,b.x,b.y); ctx.stroke();
      ctx.shadowBlur = 0;
      // Arrowhead in gold ink
      var dx=b.x-mx, dy=b.y-my, dl=Math.sqrt(dx*dx+dy*dy); dx/=dl; dy/=dl;
      ctx.setLineDash([]);
      ctx.beginPath(); ctx.moveTo(b.x-dx*13,b.y-dy*13); ctx.lineTo(b.x-dx*13-dy*5,b.y-dy*13+dx*5); ctx.lineTo(b.x-dx*7,b.y-dy*7); ctx.lineTo(b.x-dx*13+dy*5,b.y-dy*13-dx*5); ctx.closePath();
      ctx.fillStyle = GOLD; ctx.fill();
    } else if (bothV) {
      // Traveled road — looks like ink drawn on parchment
      // Cream halo so it reads over map detail
      ctx.setLineDash([8,5]);
      ctx.setLineDash([]);
      ctx.lineWidth = 7; ctx.strokeStyle = 'rgba(248,235,195,0.90)';
      ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.quadraticCurveTo(mx,my,b.x,b.y); ctx.stroke();
      ctx.lineWidth = 3.5; ctx.strokeStyle = INK;
      ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.quadraticCurveTo(mx,my,b.x,b.y); ctx.stroke();
    } else {
      // Unvisited — faint dotted suggestion of a route
      ctx.setLineDash([3,9]);
      ctx.setLineDash([7,7]);
      ctx.lineWidth = 6; ctx.strokeStyle = 'rgba(248,235,195,0.68)';
      ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.quadraticCurveTo(mx,my,b.x,b.y); ctx.stroke();
      ctx.lineWidth = 2.2; ctx.strokeStyle = INK_FAINT;
      ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.quadraticCurveTo(mx,my,b.x,b.y); ctx.stroke();
    }
    ctx.restore();
  });

  // ── NODE SYMBOLS — drawn in ink, look native to the map ──────────────────────
  // Each type gets a unique hand-drawn ink illustration
  // Scale and opacity reflect visit state

  NODES.forEach(function(node) {
    var pos = nodePos(node), nt = NODE_TYPES[node.type];
    var isV = S.visitedNodes.indexOf(node.id) >= 0;
    var isCur = node.id === S.nodePos;
    var isNext = highlightNextNodes && highlightNextNodes.indexOf(node.id) >= 0;

    var s = (0.82 + (node.row/NUM_ROWS)*0.30) * (isCur?1.3:isNext?1.15:1.0);
    var u = s * (W/380); // scale to canvas width
    var x = pos.x, y = pos.y;

    // Ink opacity based on visit state
    var alpha = isCur ? 1.0 : isNext ? 0.96 : isV ? 0.90 : 0.68;
    ctx.save();
    ctx.globalAlpha = alpha;

    // Cream backing circle — small, subtle, like ink wash on parchment
    // Larger and more opaque for active/current nodes
    // Soft parchment wash behind symbol — no circle border, looks like ink wash
    var br = (isCur ? 15 : isNext ? 13 : 10) * u;
    ctx.beginPath(); ctx.arc(x, y, br, 0, Math.PI*2);
    var bAlpha = isCur ? 0.82 : isNext ? 0.55 : isV ? 0.28 : 0.18;
    ctx.fillStyle = 'rgba(235,215,155,' + bAlpha + ')';
    ctx.shadowColor = 'rgba(12,4,0,0.55)'; ctx.shadowBlur = 8; ctx.shadowOffsetY = 3;
    ctx.fill(); ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
    // Only current node gets a hand-drawn ink ring — like circling a location on a map
    if (isCur) {
      ctx.beginPath(); ctx.arc(x, y, br, 0, Math.PI*2);
      ctx.strokeStyle = 'rgba(22,8,2,0.90)';
      ctx.lineWidth = 1.8; ctx.setLineDash([]); ctx.stroke();
    }

    // Draw ink symbol per node type
    ctx.strokeStyle = isCur ? 'rgba(40,15,4,0.95)' : INK;
    ctx.fillStyle = isCur ? 'rgba(40,15,4,0.95)' : INK;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';

    if (node.type === 'start') {
      // TENT — red, drawn in ink style
      var ts = 10*u;
      ctx.globalAlpha = alpha;
      // Tent body — red fill
      ctx.beginPath();
      ctx.moveTo(x-ts, y+ts*0.55); ctx.lineTo(x, y-ts); ctx.lineTo(x+ts, y+ts*0.55); ctx.closePath();
      ctx.fillStyle = 'rgba(175,38,22,0.88)'; ctx.fill();
      ctx.strokeStyle = 'rgba(30,10,3,0.85)'; ctx.lineWidth = 1.0*u; ctx.stroke();
      // Shadow panel
      ctx.beginPath();
      ctx.moveTo(x-ts, y+ts*0.55); ctx.lineTo(x, y-ts); ctx.lineTo(x-ts*0.08, y+ts*0.55); ctx.closePath();
      ctx.fillStyle = 'rgba(0,0,0,0.18)'; ctx.fill();
      // Door
      ctx.beginPath(); ctx.moveTo(x-ts*0.22, y+ts*0.55); ctx.quadraticCurveTo(x, y, x+ts*0.22, y+ts*0.55); ctx.closePath();
      ctx.fillStyle = 'rgba(18,6,2,0.80)'; ctx.fill();
      // Ridge pole
      ctx.beginPath(); ctx.moveTo(x, y-ts); ctx.lineTo(x, y-ts*1.35);
      ctx.strokeStyle = 'rgba(30,10,3,0.80)'; ctx.lineWidth = 0.9*u; ctx.stroke();

    } else if (node.type === 'encounter') {
      // CROSSED SWORDS — ink illustration
      var ss = 9*u;
      ctx.lineWidth = 2.2*u;
      ctx.strokeStyle = INK;
      // Sword 1: top-left to bottom-right
      ctx.beginPath(); ctx.moveTo(x-ss*0.75, y-ss*0.75); ctx.lineTo(x+ss*0.75, y+ss*0.75); ctx.stroke();
      // Sword 2: top-right to bottom-left
      ctx.beginPath(); ctx.moveTo(x+ss*0.75, y-ss*0.75); ctx.lineTo(x-ss*0.75, y+ss*0.75); ctx.stroke();
      // Crossguards
      ctx.lineWidth = 1.2*u;
      ctx.beginPath(); ctx.moveTo(x-ss*0.35, y-ss*0.55); ctx.lineTo(x+ss*0.12, y-ss*0.08); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x+ss*0.35, y-ss*0.55); ctx.lineTo(x-ss*0.12, y-ss*0.08); ctx.stroke();

    } else if (node.type === 'rest') {
      // CAMPFIRE — ink illustration
      var fs = 9*u;
      // Logs
      ctx.lineWidth = 1.8*u;
      ctx.beginPath(); ctx.moveTo(x-fs*0.65, y+fs*0.55); ctx.lineTo(x+fs*0.35, y+fs*0.15); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x+fs*0.65, y+fs*0.55); ctx.lineTo(x-fs*0.35, y+fs*0.15); ctx.stroke();
      // Flames
      ctx.lineWidth = 0.9*u;
      ctx.strokeStyle = isNext||isCur ? 'rgba(180,80,10,0.88)' : INK;
      ctx.beginPath(); ctx.moveTo(x, y+fs*0.15); ctx.quadraticCurveTo(x-fs*0.2, y-fs*0.3, x-fs*0.05, y-fs*0.6); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x, y+fs*0.15); ctx.quadraticCurveTo(x+fs*0.15, y-fs*0.4, x, y-fs*0.7); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x, y+fs*0.15); ctx.quadraticCurveTo(x+fs*0.22, y-fs*0.25, x+fs*0.08, y-fs*0.55); ctx.stroke();

    } else if (node.type === 'unknown') {
      // QUESTION MARK — old-style serif ink
      var qs = 9*u;
      ctx.font = 'bold ' + (qs*1.8) + 'px Georgia,serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = INK;
      ctx.fillText('?', x, y+qs*0.1);

    } else if (node.type === 'elite') {
      // SKULL — ink illustration
      var sk = 9*u;
      // Skull dome
      ctx.beginPath(); ctx.arc(x, y-sk*0.12, sk*0.7, Math.PI, 0); ctx.closePath();
      ctx.lineWidth = 1.2*u; ctx.strokeStyle = INK; ctx.stroke();
      // Jaw
      ctx.beginPath();
      ctx.moveTo(x-sk*0.7, y-sk*0.12);
      ctx.lineTo(x-sk*0.55, y+sk*0.55);
      ctx.lineTo(x+sk*0.55, y+sk*0.55);
      ctx.lineTo(x+sk*0.7, y-sk*0.12);
      ctx.lineWidth = 1.0*u; ctx.stroke();
      // Eye sockets
      ctx.beginPath(); ctx.arc(x-sk*0.28, y-sk*0.18, sk*0.18, 0, Math.PI*2);
      ctx.fillStyle = INK; ctx.fill();
      ctx.beginPath(); ctx.arc(x+sk*0.28, y-sk*0.18, sk*0.18, 0, Math.PI*2); ctx.fill();
      // Teeth
      ctx.lineWidth = 0.7*u;
      [-0.35,-0.12,0.12,0.35].forEach(function(tx2) {
        ctx.beginPath(); ctx.moveTo(x+tx2*sk, y+sk*0.28); ctx.lineTo(x+tx2*sk, y+sk*0.52); ctx.stroke();
      });

    } else if (node.type === 'event') {
      // SCROLL / JOURNAL — ink illustration
      var es = 9*u;
      ctx.lineWidth = 1.8*u;
      // Main scroll body
      ctx.beginPath(); ctx.rect(x-es*0.65, y-es*0.5, es*1.3, es*1.0); ctx.stroke();
      // Rolled ends
      ctx.beginPath(); ctx.ellipse(x-es*0.65, y, es*0.18, es*0.5, 0, 0, Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.ellipse(x+es*0.65, y, es*0.18, es*0.5, 0, 0, Math.PI*2); ctx.stroke();
      // Lines of text
      ctx.lineWidth = 0.65*u; ctx.globalAlpha = alpha * 0.6;
      [-.22,0,.22].forEach(function(ly2) {
        ctx.beginPath(); ctx.moveTo(x-es*0.42, y+ly2*es); ctx.lineTo(x+es*0.42, y+ly2*es); ctx.stroke();
      });
      ctx.globalAlpha = alpha;

    } else if (node.type === 'temple') {
      // TEMPLE PILLARS — ink illustration
      var tp = 10*u;
      ctx.lineWidth = 2.0*u;
      // Pediment (triangle)
      ctx.beginPath(); ctx.moveTo(x-tp*0.85, y-tp*0.2); ctx.lineTo(x, y-tp*0.85); ctx.lineTo(x+tp*0.85, y-tp*0.2); ctx.closePath(); ctx.stroke();
      // Entablature
      ctx.beginPath(); ctx.rect(x-tp*0.85, y-tp*0.2, tp*1.7, tp*0.18); ctx.stroke();
      // Columns
      [-0.6,-0.2,0.2,0.6].forEach(function(cx3) {
        ctx.beginPath(); ctx.rect(x+cx3*tp-tp*0.1, y-tp*0.02, tp*0.2, tp*0.72); ctx.stroke();
      });
      // Base steps
      ctx.beginPath(); ctx.rect(x-tp*0.92, y+tp*0.70, tp*1.84, tp*0.15); ctx.stroke();
      ctx.beginPath(); ctx.rect(x-tp*0.78, y+tp*0.55, tp*1.56, tp*0.15); ctx.stroke();
    }

    // CURRENT POSITION — red wax seal dot above symbol
    if (isCur) {
      // If travelling, skip the static marker (we draw it interpolated below)
      if (travelFromId != null && travelT != null && travelT < 1) {
        // draw nothing here — interpolated marker drawn after node loop
      } else {
        ctx.globalAlpha = 1;
        var pulse = 0.65 + 0.35*Math.sin(now/320);
        ctx.beginPath(); ctx.arc(x, y-13*u-9*u, 9*u*pulse, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(200,35,15,0.90)';
        ctx.shadowColor = 'rgba(220,50,20,0.70)'; ctx.shadowBlur = 10*pulse; ctx.fill(); ctx.shadowBlur = 0;
        ctx.beginPath(); ctx.moveTo(x, y-13*u-2); ctx.lineTo(x-4.5*u, y-13*u-8*u); ctx.lineTo(x+4.5*u, y-13*u-8*u); ctx.closePath();
        ctx.fillStyle = 'rgba(200,35,15,0.90)'; ctx.fill();
        ctx.beginPath(); ctx.arc(x, y-13*u-9*u, 9*u*pulse, 0, Math.PI*2);
        ctx.strokeStyle = 'rgba(80,15,5,0.60)'; ctx.lineWidth = 0.8; ctx.stroke();
      }
    }

    // NEXT NODE — subtle ink bracket/frame to indicate availability
    if (isNext && !isCur) {
      ctx.globalAlpha = 0.75 + 0.25*Math.sin(now/450);
      var fr = 14*u;
      ctx.strokeStyle = GOLD; ctx.lineWidth = 1.5*u; ctx.setLineDash([]);
      // Corner brackets (like a map pin frame)
      var bLen = fr*0.4;
      [[-1,-1],[1,-1],[1,1],[-1,1]].forEach(function(corner) {
        ctx.beginPath();
        ctx.moveTo(x + corner[0]*(fr-bLen), y + corner[1]*fr);
        ctx.lineTo(x + corner[0]*fr, y + corner[1]*fr);
        ctx.lineTo(x + corner[0]*fr, y + corner[1]*(fr-bLen));
        ctx.stroke();
      });
      ctx.globalAlpha = alpha;
    }

    // VISITED STAMP — small ink check mark (bottom right of node)
    if (isV && !isCur) {
      ctx.globalAlpha = 0.65;
      ctx.strokeStyle = INK; ctx.lineWidth = 1.2*u; ctx.setLineDash([]);
      var cx2 = x + 10*u, cy2 = y + 10*u;
      // Simple checkmark
      ctx.beginPath(); ctx.moveTo(cx2-3.5*u, cy2); ctx.lineTo(cx2-1*u, cy2+3*u); ctx.lineTo(cx2+4*u, cy2-3*u);
      ctx.stroke();
    }

    ctx.globalAlpha = 1;
    ctx.restore();

    // NODE TYPE LABEL — cartographic serif, only for next/current
    if (isNext || isCur) {
      ctx.save();
      var lbl = nt.label.toUpperCase();
      ctx.font = 'italic ' + Math.round(6.5*(0.82+(node.row/NUM_ROWS)*0.30)) + 'px Georgia,serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      var tw = ctx.measureText(lbl).width;
      var ly = pos.y + 15*u;
      // Parchment label background
      ctx.fillStyle = 'rgba(238,218,160,0.88)';
      ctx.strokeStyle = 'rgba(45,20,5,0.65)'; ctx.lineWidth = 0.7;
      ctx.fillRect(pos.x-tw/2-3, ly-1, tw+6, 11); ctx.strokeRect(pos.x-tw/2-3, ly-1, tw+6, 11);
      ctx.fillStyle = 'rgba(45,20,5,0.90)'; ctx.fillText(lbl, pos.x, ly);
      ctx.restore();
    }
  });

  // ── TRAVELLING MARKER — interpolates between two nodes ───────────────────────
  if (travelFromId != null && travelToId != null && travelT != null) {
    var fromNode = NODES[travelFromId], toNode = NODES[travelToId];
    if (fromNode && toNode) {
      var fp = nodePos(fromNode), tp2 = nodePos(toNode);
      var u2 = (0.82 + (toNode.row/NUM_ROWS)*0.30) * 1.3 * (W/380);
      var mx2 = (fp.x+tp2.x)/2 + (tp2.y-fp.y)*0.08;
      var my2 = (fp.y+tp2.y)/2 + (fp.x-tp2.x)*0.08;
      var t2 = travelT;
      var bx = (1-t2)*(1-t2)*fp.x + 2*(1-t2)*t2*mx2 + t2*t2*tp2.x;
      var by = (1-t2)*(1-t2)*fp.y + 2*(1-t2)*t2*my2 + t2*t2*tp2.y;
      var markerY = by - 13*u2 - 9*u2;
      ctx.globalAlpha = 1;
      ctx.beginPath(); ctx.arc(bx, markerY, 9*u2, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(200,35,15,0.92)';
      ctx.shadowColor = 'rgba(220,50,20,0.70)'; ctx.shadowBlur = 12; ctx.fill(); ctx.shadowBlur = 0;
      ctx.beginPath(); ctx.moveTo(bx, by-13*u2-2); ctx.lineTo(bx-4.5*u2, markerY); ctx.lineTo(bx+4.5*u2, markerY); ctx.closePath();
      ctx.fillStyle = 'rgba(200,35,15,0.92)'; ctx.fill();
      ctx.beginPath(); ctx.arc(bx, markerY, 9*u2, 0, Math.PI*2);
      ctx.strokeStyle = 'rgba(80,15,5,0.60)'; ctx.lineWidth = 0.8; ctx.stroke();
    }
  }
}

function animateSpireMap(canvasId, highlights) {
  drawSpireMap(canvasId, highlights);
  if (mapRaf !== null) mapRaf = requestAnimationFrame(function() { animateSpireMap(canvasId, highlights); });
}

var _markerAnimT = 1; // 0→1 travel progress
var _markerAnimFrame = null;

function animateMarkerTravel(canvasId, fromId, toId, onDone) {
  if (_markerAnimFrame) cancelAnimationFrame(_markerAnimFrame);
  _markerAnimT = 0;
  var start = null;
  var duration = 600; // ms
  function step(ts) {
    if (!start) start = ts;
    _markerAnimT = Math.min(1, (ts - start) / duration);
    // Ease in-out
    var t = _markerAnimT < 0.5 ? 2*_markerAnimT*_markerAnimT : -1+(4-2*_markerAnimT)*_markerAnimT;
    drawSpireMapWithTravel(canvasId, fromId, toId, t);
    if (_markerAnimT < 1) {
      _markerAnimFrame = requestAnimationFrame(step);
    } else {
      _markerAnimFrame = null;
      _markerAnimT = 1;
      if (onDone) onDone();
      startSpireMap(canvasId, null);
    }
  }
  _markerAnimFrame = requestAnimationFrame(step);
}

function drawSpireMapWithTravel(canvasId, fromId, toId, t) {
  // Temporarily override nodePos for drawing
  var realPos = S.nodePos;
  var realPrev = S.prevNodePos;
  // Draw the map normally but with interpolated marker
  drawSpireMap(canvasId, null, fromId, toId, t);
}

function startSpireMap(canvasId, highlights) {
  if (mapRaf !== null) { cancelAnimationFrame(mapRaf); }
  mapRaf = 1; // non-null sentinel to start loop
  setTimeout(function() { animateSpireMap(canvasId, highlights); }, 60);
}

function stopMap() {
  if (mapRaf && mapRaf !== 1) cancelAnimationFrame(mapRaf);
  mapRaf = null;
}

// ── RENDER ──────────────────────────────────────────────────────────────────────

function saveKey() {
  var input = document.getElementById('api-key-input');
  var key = input ? input.value.trim() : '';
  if (!key.startsWith('sk-ant-')) {
    alert('That doesn\'t look like an Anthropic API key. It should start with sk-ant-');
    return;
  }
  localStorage.setItem('waybound_api_key', key);
  API_KEY = key;
  S.screen = 'start';
  render();
}

function rSetup() {
  return '<div class="setup-wrap">'
    + '<span class="setup-icon">🧭</span>'
    + '<div class="fredoka setup-title">Waybound</div>'
    + '<span class="setup-sub">To play, you need a free Anthropic API key.<br>It stays on your device and is never shared.</span>'
    + '<div class="setup-card">'
    + '<span class="setup-label">Your Anthropic API Key</span>'
    + '<input id="api-key-input" class="setup-input" type="password" placeholder="sk-ant-..." />'
    + '<span class="setup-hint">Get a free key at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a> &rarr; API Keys.<br>Your key is stored locally on this device only.</span>'
    + '</div>'
    + '<button class="btn btn-green" onclick="saveKey()">Start the Journey &rarr;</button>'
    + '</div>';
}

function render() {
  stopMap();
  var app = document.getElementById('app');
  if      (S.screen === 'setup')  { app.innerHTML = rSetup(); }
  else if (S.screen === 'start') { app.innerHTML = rStart(); }
  else if (S.screen === 'game')  {
    app.innerHTML = rGame();
    if (S.prevNodePos != null && S.prevNodePos !== S.nodePos) {
      animateMarkerTravel('main-map', S.prevNodePos, S.nodePos, function() {
        S.prevNodePos = null;
      });
    } else {
      startSpireMap('main-map', null);
    }
  }
  else if (S.screen === 'chore') {
    app.innerHTML = rChore();
    if (S.choreStep === 1 && !S.pathsLoading) {
      var nextIds = S.pathOptions.map(function(p) { return p.nodeId; });
      startSpireMap('chore-map', nextIds);
    } else if (S.choreStep === 1) {
      startSpireMap('chore-map', null);
    }
  }
  else if (S.screen === 'end')   { app.innerHTML = rEnd(); }
}

function resMiniBar() {
  return '<div class="res-mini-bar">'
    + RES.map(function(r) {
        var v = S.resources[r.id], danger = v <= 30;
        return '<div class="res-mini-item">'
          + r.icon + ' <span style="color:' + (danger ? 'var(--rose)' : r.color) + '">'
          + (danger ? '⚠ ' : '') + v + '</span></div>';
      }).join('')
    + '</div>';
}

function mapLegend() {
  var types = ['encounter','rest','unknown','elite','event'];
  return '<div class="map-legend">'
    + types.map(function(t) {
        var nt = NODE_TYPES[t];
        return '<div class="legend-item">' + nt.icon + ' ' + nt.label + '</div>';
      }).join('')
    + '</div>';
}

  return '<div class="start-wrap">'
    + '<span class="start-emblem" style="animation:bounce 2.5s ease-in-out infinite;display:block;margin-bottom:6px"><svg width="90" height="90" viewBox="0 0 160 160" style="display:block;margin:0 auto 6px"><defs><clipPath id="wbi"><rect x="6" y="6" width="148" height="148" rx="20"/></clipPath></defs><rect x="2" y="2" width="156" height="156" rx="22" fill="#d4c090" stroke="#3a2208" stroke-width="3"/><rect x="6" y="6" width="148" height="148" rx="19" fill="#e8dbb8"/><rect x="6" y="6" width="148" height="88" rx="19" fill="rgba(175,210,235,0.22)" clip-path="url(#wbi)"/><g clip-path="url(#wbi)"><circle cx="28" cy="36" r="9.5" fill="#f4f0e4" stroke="#3a2208" stroke-width="1"/><circle cx="40" cy="31" r="12" fill="#f4f0e4" stroke="#3a2208" stroke-width="1"/><circle cx="53" cy="35" r="10" fill="#f4f0e4" stroke="#3a2208" stroke-width="1"/><circle cx="41" cy="42" r="9" fill="#f4f0e4"/><rect x="19" y="36" width="44" height="8" fill="#f4f0e4"/><line x1="19" y1="44" x2="63" y2="44" stroke="#3a2208" stroke-width="1"/><circle cx="112" cy="30" r="8" fill="#f4f0e4" stroke="#3a2208" stroke-width="0.9"/><circle cx="122" cy="25" r="10" fill="#f4f0e4" stroke="#3a2208" stroke-width="0.9"/><circle cx="133" cy="29" r="8.5" fill="#f4f0e4" stroke="#3a2208" stroke-width="0.9"/><circle cx="123" cy="36" r="8" fill="#f4f0e4"/><rect x="103" y="30" width="38" height="8" fill="#f4f0e4"/><line x1="103" y1="38" x2="141" y2="38" stroke="#3a2208" stroke-width="0.9"/><circle cx="76" cy="18" r="5.5" fill="#f4f0e4" stroke="#3a2208" stroke-width="0.8"/><circle cx="85" cy="14" r="7" fill="#f4f0e4" stroke="#3a2208" stroke-width="0.8"/><circle cx="94" cy="18" r="5.5" fill="#f4f0e4" stroke="#3a2208" stroke-width="0.8"/><rect x="69" y="18" width="31" height="7" fill="#f4f0e4"/><line x1="69" y1="25" x2="100" y2="25" stroke="#3a2208" stroke-width="0.8"/></g><g clip-path="url(#wbi)"><path d="M6 102 L28 68 L50 102 Z" fill="#d0caa8" stroke="#3a2208" stroke-width="0.7" stroke-linejoin="round"/><path d="M44 102 L70 58 L96 102 Z" fill="#ccc6a2" stroke="#3a2208" stroke-width="0.8" stroke-linejoin="round"/><path d="M90 102 L116 64 L142 102 Z" fill="#d0caa8" stroke="#3a2208" stroke-width="0.7" stroke-linejoin="round"/></g><g clip-path="url(#wbi)"><path d="M6 122 L46 44 L86 122 Z" fill="#b4ac8c" stroke="#3a2208" stroke-width="1.8" stroke-linejoin="round"/><path d="M46 44 L38 64 L54 64 Z" fill="#f4f0e4" stroke="#3a2208" stroke-width="1.3"/><path d="M62 122 L100 20 L138 122 Z" fill="#a8a080" stroke="#3a2208" stroke-width="2.3" stroke-linejoin="round"/><path d="M100 20 L90 48 L110 48 Z" fill="#f8f4e8" stroke="#3a2208" stroke-width="1.6"/><path d="M120 122 L146 52 L154 122 Z" fill="#b8b094" stroke="#3a2208" stroke-width="1.6" stroke-linejoin="round"/><path d="M146 52 L140 68 L152 68 Z" fill="#f0ece0" stroke="#3a2208" stroke-width="1.1"/></g><path d="M6 122 Q40 114 80 118 Q120 122 154 114 L154 148 Q120 154 80 152 Q40 154 6 148 Z" fill="#88a840" stroke="#3a2208" stroke-width="1.2" clip-path="url(#wbi)"/><path d="M6 136 Q42 128 80 132 Q118 136 154 128" fill="none" stroke="rgba(100,160,210,0.5)" stroke-width="6" stroke-linecap="round" clip-path="url(#wbi)"/><path d="M6 136 Q42 128 80 132 Q118 136 154 128" fill="none" stroke="rgba(170,215,245,0.4)" stroke-width="3.5" stroke-linecap="round" clip-path="url(#wbi)"/><g clip-path="url(#wbi)"><ellipse cx="80" cy="124" rx="15" ry="3" fill="rgba(20,10,0,0.18)"/><path d="M64 122 L80 96 L96 122 Z" fill="#c03828" stroke="#1a0804" stroke-width="2" stroke-linejoin="round"/><path d="M64 122 L80 96 L72 122 Z" fill="rgba(0,0,0,0.14)"/><path d="M74 122 Q80 111 86 122 Z" fill="#100804"/><line x1="80" y1="96" x2="80" y2="88" stroke="#1a0804" stroke-width="1.5" stroke-linecap="round"/><circle cx="80" cy="87" r="2.2" fill="#1a0804"/></g><g clip-path="url(#wbi)"><line x1="100" y1="126" x2="112" y2="123" stroke="#5a3010" stroke-width="2.8" stroke-linecap="round"/><line x1="102" y1="124" x2="114" y2="126" stroke="#4a2808" stroke-width="2.8" stroke-linecap="round"/><ellipse cx="106" cy="126" rx="7" ry="2.2" fill="rgba(220,120,20,0.2)"/><path d="M102 126 Q101 118 106 112 Q108 118 109 122 Q111 115 106 109 Q104 117 103 121 Q107 111 110 115 Q111 119 109 123 Q107 117 106 126 Z" fill="#e87820"/><path d="M104 126 Q103 120 106 116 Q107 121 106 126 Z" fill="#f8d040"/></g></svg></span>'
    + '<div class="fredoka start-title">Waybound</div>'
    + '<span class="start-tag">Find Your Way Home</span>'
    + '<p class="start-lore">Your sister Mara went into the jungle six months ago and never came back. This morning you found her journal page under the floorboards. She made it further than anyone knew — and someone was following her. The Temple of Aurathen is real, and whatever she found there is still waiting.</p>'
    + '<div class="start-hints">'
    + '<div class="hint-row"><span class="hint-icon">🧹</span><span>Every chore lets you move one step forward on the map</span></div>'
    + '<div class="hint-row"><span class="hint-icon">⚔️</span><span>Node types signal risk — encounters hurt, rest restores, unknowns surprise</span></div>'
    + '<div class="hint-row"><span class="hint-icon">⭐⭐</span><span>Hard chores (Bathrooms, Yard Work) count as <strong>2 steps</strong></span></div>'
    + '</div>'
    + '<button class="btn btn-green" onclick="startGame()">🌟 Find Mara</button>'
    + '</div>';
}

function rGame() {
  var latest = S.passages.length ? S.passages[S.passages.length-1] : null;
  var cur = currentNode();
  var nt = cur ? NODE_TYPES[cur.type] : NODE_TYPES.start;
  var row = cur ? cur.row : 0;
  var resCards = RES.map(function(r) {
    var v=S.resources[r.id], danger=v<=20, warn=v<=15?'Critical!':v<=30?'Low':'';
    return '<div class="res-card'+(danger?' danger':'')+'"><span class="res-icon">'+r.icon+'</span><span class="res-label">'+r.name+'</span><div class="res-track"><div class="res-fill" style="width:'+v+'%;background:'+r.bar+'"></div></div><span class="res-val" style="color:'+r.color+'">'+v+'</span>'+(warn?'<span class="res-warn">'+warn+'</span>':'')+'</div>';
  }).join('');
  var sceneHtml = '';
  if (false) sceneHtml = ''; // image generation removed
  else if (S.sceneImageUrl) sceneHtml = '<div class="scene-wrap"><img class="scene-img" src="'+S.sceneImageUrl+'" alt="" onerror="this.parentElement.style.display=\'none\'"></div>';
  var story = S.storyLoading
    ? '<div class="loading-row"><span class="spin">🌀</span> Writing your story…</div>'
    : '<div class="story-body">'+hx(latest ? latest.text : 'The jungle stretches out before you. Mara came this way.')+'</div>';
  var hist = '';
  if (S.passages.length > 1) {
    hist = '<details><summary class="history-toggle">📜 Journal (' + (S.passages.length-1) + ' previous entries)</summary>'
      + S.passages.slice(0,-1).reverse().map(function(p) {
          return '<div class="card history-passage"><span class="chapter-label">📖 '+hx(p.chapter)+'</span><div class="story-body">'+hx(p.text)+'</div></div>';
        }).join('') + '</details>';
  }
  return '<div class="game-header-row">'
    + '<span class="fredoka game-title" style="display:flex;align-items:center;gap:8px"><svg width="24" height="24" viewBox="0 0 160 160"><defs><clipPath id="wbh"><rect x="6" y="6" width="148" height="148" rx="20"/></clipPath></defs><rect x="2" y="2" width="156" height="156" rx="22" fill="#d4c090" stroke="#3a2208" stroke-width="3"/><rect x="6" y="6" width="148" height="148" rx="19" fill="#e8dbb8"/><rect x="6" y="6" width="148" height="88" rx="19" fill="rgba(175,210,235,0.22)" clip-path="url(#wbh)"/><g clip-path="url(#wbh)"><circle cx="40" cy="31" r="12" fill="#f4f0e4" stroke="#3a2208" stroke-width="1"/><circle cx="28" cy="36" r="9.5" fill="#f4f0e4" stroke="#3a2208" stroke-width="1"/><circle cx="53" cy="35" r="10" fill="#f4f0e4" stroke="#3a2208" stroke-width="1"/><rect x="19" y="36" width="44" height="8" fill="#f4f0e4"/><line x1="19" y1="44" x2="63" y2="44" stroke="#3a2208" stroke-width="1"/><circle cx="122" cy="25" r="10" fill="#f4f0e4" stroke="#3a2208" stroke-width="0.9"/><circle cx="112" cy="30" r="8" fill="#f4f0e4" stroke="#3a2208" stroke-width="0.9"/><circle cx="133" cy="29" r="8.5" fill="#f4f0e4" stroke="#3a2208" stroke-width="0.9"/><rect x="103" y="30" width="38" height="8" fill="#f4f0e4"/><line x1="103" y1="38" x2="141" y2="38" stroke="#3a2208" stroke-width="0.9"/></g><g clip-path="url(#wbh)"><path d="M6 122 L46 44 L86 122 Z" fill="#b4ac8c" stroke="#3a2208" stroke-width="1.8" stroke-linejoin="round"/><path d="M46 44 L38 64 L54 64 Z" fill="#f4f0e4" stroke="#3a2208" stroke-width="1.3"/><path d="M62 122 L100 20 L138 122 Z" fill="#a8a080" stroke="#3a2208" stroke-width="2.3" stroke-linejoin="round"/><path d="M100 20 L90 48 L110 48 Z" fill="#f8f4e8" stroke="#3a2208" stroke-width="1.6"/><path d="M120 122 L146 52 L154 122 Z" fill="#b8b094" stroke="#3a2208" stroke-width="1.6" stroke-linejoin="round"/></g><path d="M6 122 Q40 114 80 118 Q120 122 154 114 L154 148 Q120 154 80 152 Q40 154 6 148 Z" fill="#88a840" stroke="#3a2208" stroke-width="1.2" clip-path="url(#wbh)"/><g clip-path="url(#wbh)"><path d="M64 122 L80 96 L96 122 Z" fill="#c03828" stroke="#1a0804" stroke-width="2" stroke-linejoin="round"/><path d="M74 122 Q80 111 86 122 Z" fill="#100804"/><line x1="100" y1="126" x2="112" y2="123" stroke="#5a3010" stroke-width="2.8" stroke-linecap="round"/><line x1="102" y1="124" x2="114" y2="126" stroke="#4a2808" stroke-width="2.8" stroke-linecap="round"/><path d="M102 126 Q101 118 106 112 Q108 118 106 126 Z" fill="#e87820"/><path d="M104 126 Q103 120 106 116 Q107 121 106 126 Z" fill="#f8d040"/></g></svg> Waybound</span>'
    + '<div class="game-meta"><span class="day-badge">Day ' + (S.choresCompleted+1) + ' · ' + S.choresCompleted + ' chores</span>'
    + '<button class="reset-btn" onclick="confirmReset()">↺ Reset</button></div></div>'
    + '<div class="resources">' + resCards + '</div>'
    + '<div class="map-canvas-wrap"><canvas id="main-map" style="display:block;width:100%"></canvas></div>'
    + mapLegend()
    + sceneHtml
    + '<div class="card story-card"><span class="chapter-label">📖 '+hx(latest?latest.chapter:'The Expedition Begins')+'</span>'+story+'</div>'
    + hist
    + '<button class="fab" onclick="openChore()">✓ Chore Done</button>';
}

function rChore() {
  var step = S.choreStep;
  var dots = [0,1].map(function(i) {
    return '<div class="dot'+(i===step?' active':i<step?' done':'')+'"></div>';
  }).join('');
  var inner = '';
  if (step === 0) {
    inner = resMiniBar()
      + '<span class="fredoka flow-head">🎉 Chore Complete!</span>'
      + '<span class="flow-sub">What did you accomplish?</span>'
      + '<span class="section-label">Select your chore</span>'
      + '<div class="chore-grid">'
      + CHORES.map(function(c, idx) {
          var selected = S.selectedChore && S.selectedChore.id === c.id;
          return '<button class="chore-btn'+(selected?' selected':'')+'" data-idx="'+idx+'" onclick="pickChore(this.dataset.idx)">'
            + '<span class="chore-icon-big">'+c.icon+'</span>'
            + hx(c.name)
            + '<span class="chore-diff diff-'+c.diff+'">'
            + (c.diff==='hard'?'⭐⭐ Hard · 2 steps':c.diff==='medium'?'⭐ Medium':'Easy')
            + '</span></button>';
        }).join('')
      + '</div>'
      + '<button class="btn btn-green" '+(S.selectedChore?'':'disabled')+' onclick="goNext()">Continue →</button>';
  } else if (step === 1) {
    var nextNodes = getNextNodes();
    if (S.pathsLoading) {
      inner = '<div class="map-canvas-wrap"><canvas id="chore-map" style="display:block;width:100%"></canvas></div>'
        + resMiniBar()
        + '<span class="fredoka flow-head">🌿 Scouting routes…</span>'
        + '<div class="paths-loading"><span class="spin" style="font-size:2rem;display:block;margin-bottom:12px">🌀</span>Charting paths through the jungle…</div>';
    } else {
      inner = '<div class="map-canvas-wrap"><canvas id="chore-map" style="display:block;width:100%"></canvas></div>'
        + mapLegend()
        + resMiniBar()
        + '<span class="fredoka flow-head">🌿 Choose your path</span>'
        + '<span class="flow-sub">The map shows where each route leads ↑</span>'
        + '<div class="path-cards">'
        + S.pathOptions.map(function(opt, i) {
            var nt = NODE_TYPES[opt.type] || NODE_TYPES.unknown;
            var selected = S.selectedPath === i;
            return '<button class="path-card'+(selected?' selected':'')+'" data-i="'+i+'" onclick="pickPath(this.dataset.i)" style="'+(selected?'border-color:'+nt.color+';background:'+nt.bg+';box-shadow:0 3px 0 '+nt.color+';':'')+'">'
              + '<div class="path-node-icon" style="color:'+nt.color+';background:'+nt.bg+'">'+nt.icon+'</div>'
              + '<div class="path-card-body">'
              + '<div class="path-node-type" style="color:'+nt.color+'">'+nt.label+'</div>'
              + '<div class="path-node-desc">'+hx(opt.desc)+'</div>'
              + '</div></button>';
          }).join('')
        + '</div>'
        + '<button class="btn btn-amber" '+(S.selectedPath===null?'disabled':'')+' onclick="confirmChore()">🌿 Push Forward</button>';
    }
  }
  return '<div class="chore-flow-wrap">'
    + '<div class="back-row"><button class="btn-ghost" onclick="closeChore()">← Back to Camp</button></div>'
    + '<div class="step-dots">'+dots+'</div>'
    + inner + '</div>';
}

function rEnd() {
  var won = S.nodePos === 14 || (currentNode() && currentNode().type === 'temple');
  return '<div class="end-wrap">'
    + '<span class="end-emblem">'+(won?'🏛️':'🏡')+'</span>'
    + '<div class="fredoka end-title '+(won?'victory':'defeat')+'">'+(won?'The Temple of Aurathen':'The Jungle Wins Today')+'</div>'
    + (S.endLoading ? '<div class="loading-row" style="justify-content:center;margin-bottom:24px"><span class="spin">🌀</span> Writing your ending…</div>' : '<div class="end-story">'+hx(S.endingText)+'</div>')
    + '<div class="end-stats">Chores: <strong>'+S.choresCompleted+'</strong><br>'
    + 'Gold: <strong style="color:#c88010">'+S.resources.gold+'</strong> &nbsp;·&nbsp; '
    + 'Health: <strong style="color:#c04050">'+S.resources.health+'</strong> &nbsp;·&nbsp; '
    + 'Food: <strong style="color:#4a8030">'+S.resources.food+'</strong></div>'
    + '<button class="btn btn-green" onclick="restart()">🌿 Try Again</button>'
    + '</div>';
}

if (S.screen === 'chore') S.screen = 'game';
render();

</script>
</body>
</html>
